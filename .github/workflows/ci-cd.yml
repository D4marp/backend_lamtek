name: CI/CD Pipeline to GHCR

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint --if-present
        continue-on-error: true

      - name: Run Tests
        run: npm test --if-present
        continue-on-error: true

      # Lowercase the repository name for GHCR compatibility
      - name: Lowercase Repo Name
        run: |
          echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image Summary
        if: success()
        run: |
          echo "## 🐳 Docker Image Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** ${{ env.REGISTRY }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ${{ env.REPO_LOWER }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** latest" >> $GITHUB_STEP_SUMMARY
          echo "**Full Reference:** ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}:latest" >> $GITHUB_STEP_SUMMARY

      - name: Notify Deploy Success
        if: success()
        run: |
          echo "✅ Build and push successful!"
          echo "Image: ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}:latest"

  deploy-to-paas:
    needs: build-test-deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lowercase Repo Name
        run: |
          echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Trigger PaaS Deploy
        if: success()
        run: |
          if [ -z "${{ secrets.PAAS_WEBHOOK_URL }}" ]; then
            echo "⚠️  PAAS_WEBHOOK_URL not configured, skipping deployment"
          else
            echo "🚀 Triggering PaaS deployment..."
            curl -X POST \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.PAAS_WEBHOOK_TOKEN }}" \
              -d "{\"image\": \"${{ env.REGISTRY }}/${{ env.REPO_LOWER }}:latest\", \"timestamp\": \"$(date -u +'%Y-%m-%dT%H:%M:%SZ')\"}" \
              ${{ secrets.PAAS_WEBHOOK_URL }}
            echo "✅ Deployment webhook triggered"
          fi

      - name: Deployment Summary
        if: success()
        run: |
          echo "## 🚀 Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** Deployment webhook sent to PaaS" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}:latest" >> $GITHUB_STEP_SUMMARY
